<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>3D Match</title>
<style>
  body { margin:0; overflow:hidden; }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
const size = 5;
const colors = [0xff4444,0x44aaff,0x44ff44,0xffff44,0xaa44ff];

let scene, camera, renderer;
let grid = [];
let cubes = [];
let selected = null;

init();
animate();

function init(){
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(6,6,6);
  camera.lookAt(2,2,2);

  renderer = new THREE.WebGLRenderer();
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(5,10,5);
  scene.add(light);

  for(let y=0;y<size;y++){
    grid[y]=[];
    cubes[y]=[];

    for(let x=0;x<size;x++){
      let c = Math.floor(Math.random()*colors.length);
      grid[y][x]=c;

      let geo = new THREE.BoxGeometry(0.9,0.9,0.9);
      let mat = new THREE.MeshStandardMaterial({color:colors[c]});
      let cube = new THREE.Mesh(geo,mat);

      cube.position.set(x,0,y);
      scene.add(cube);

      cubes[y][x]=cube;
    }
  }

  window.addEventListener("click", onClick);
}

function onClick(e){
  let mouse = new THREE.Vector2(
    (e.clientX/window.innerWidth)*2-1,
    -(e.clientY/window.innerHeight)*2+1
  );

  let raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(mouse,camera);

  let hits = raycaster.intersectObjects(scene.children);

  for(let h of hits){
    let pos = h.object.position;

    let x = Math.round(pos.x);
    let y = Math.round(pos.z);

    if(!selected){
      selected = {x,y};
    } else {
      if(Math.abs(selected.x-x)+Math.abs(selected.y-y)==1){
        swap(selected,{x,y});
        resolve();
      }
      selected=null;
    }
    break;
  }
}

function swap(a,b){
  let t = grid[a.y][a.x];
  grid[a.y][a.x]=grid[b.y][b.x];
  grid[b.y][b.x]=t;

  update();
}

function update(){
  for(let y=0;y<size;y++){
    for(let x=0;x<size;x++){
      let c = grid[y][x];
      cubes[y][x].material.color.setHex(colors[c]);
    }
  }
}

function resolve(){
  let matched=[];

  for(let y=0;y<size;y++){
    for(let x=0;x<size-2;x++){
      let c=grid[y][x];
      if(c==grid[y][x+1] && c==grid[y][x+2]){
        matched.push([x,y],[x+1,y],[x+2,y]);
      }
    }
  }

  for(let x=0;x<size;x++){
    for(let y=0;y<size-2;y++){
      let c=grid[y][x];
      if(c==grid[y+1][x] && c==grid[y+2][x]){
        matched.push([x,y],[x,y+1],[x,y+2]);
      }
    }
  }

  if(matched.length==0) return;

  for(let m of matched){
    grid[m[1]][m[0]] = Math.floor(Math.random()*colors.length);
  }

  update();
}

function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene,camera);
}
</script>

</body>
</html>
