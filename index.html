<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>3D Match Fixed</title>
<style>
  body { margin:0; overflow:hidden; touch-action:none; }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
const size = 5;
const colors = [0xff4444,0x44aaff,0x44ff44,0xffff44,0xaa44ff];

let scene, camera, renderer;
let grid = [];
let cubes = [];
let pickables = [];

let startCell = null;

init();
animate();

function init(){
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(6,6,6);
  camera.lookAt(2,0,2);

  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.DirectionalLight(0xffffff, 1).position.set(5,10,5));

  for(let y=0;y<size;y++){
    grid[y]=[];
    cubes[y]=[];

    for(let x=0;x<size;x++){
      let c = rand();
      grid[y][x]=c;

      let cube = new THREE.Mesh(
        new THREE.BoxGeometry(0.9,0.9,0.9),
        new THREE.MeshStandardMaterial({color:colors[c]})
      );

      cube.position.set(x,0,y);
      scene.add(cube);

      cubes[y][x]=cube;
      pickables.push(cube);
    }
  }

  window.addEventListener("pointerdown", onDown);
  window.addEventListener("pointerup", onUp);
}

function rand(){
  return Math.floor(Math.random()*colors.length);
}

// ★ 安定版セル取得
function getCell(e){
  let mouse = new THREE.Vector2(
    (e.clientX/window.innerWidth)*2-1,
    -(e.clientY/window.innerHeight)*2+1
  );

  let ray = new THREE.Raycaster();
  ray.setFromCamera(mouse,camera);

  let hits = ray.intersectObjects(pickables);

  if(hits.length === 0) return null;

  let p = hits[0].object.position;

  return {x:Math.round(p.x), y:Math.round(p.z)};
}

function onDown(e){
  startCell = getCell(e);
}

function onUp(e){
  let endCell = getCell(e);

  if(!startCell || !endCell) return;

  let dx = endCell.x - startCell.x;
  let dy = endCell.y - startCell.y;

  if(Math.abs(dx)+Math.abs(dy) === 1){
    swap(startCell,endCell);
    resolve();
  }

  startCell = null;
}

function swap(a,b){
  let t = grid[a.y][a.x];
  grid[a.y][a.x] = grid[b.y][b.x];
  grid[b.y][b.x] = t;

  update();
}

function update(){
  for(let y=0;y<size;y++){
    for(let x=0;x<size;x++){
      cubes[y][x].material.color.setHex(colors[grid[y][x]]);
    }
  }
}

// ★ 超簡易マッチ処理
function resolve(){
  let matched = [];

  for(let y=0;y<size;y++){
    for(let x=0;x<size-2;x++){
      let c = grid[y][x];
      if(c===grid[y][x+1] && c===grid[y][x+2]){
        matched.push([x,y],[x+1,y],[x+2,y]);
      }
    }
  }

  for(let x=0;x<size;x++){
    for(let y=0;y<size-2;y++){
      let c = grid[y][x];
      if(c===grid[y+1][x] && c===grid[y+2][x]){
        matched.push([x,y],[x,y+1],[x,y+2]);
      }
    }
  }

  if(matched.length===0) return;

  for(let m of matched){
    grid[m[1]][m[0]] = rand();
  }

  update();
}

function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene,camera);
}
</script>

</body>
</html>
